name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      fleetbase_ref:
        description: 'Git ref of fleetbase/fleetbase (or your fork) to deploy'
        required: false
        default: 'main'
  push:
    branches: [main]
    paths:
      - 'infrastructure/scripts/**'
      - '.github/workflows/deploy-application.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'ulogistics-production' }}
  FLEETBASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fleetbase_ref || vars.FLEETBASE_REF || 'main' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 instance ID
        id: infra
        run: |
          INSTANCE_ID="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy Fleetbase on EC2
        env:
          INSTANCE_ID: ${{ steps.infra.outputs.instance_id }}
          FLEETBASE_REF: ${{ env.FLEETBASE_REF }}
        run: |
          chmod +x scripts/deploy-app-ssm.sh
          ./scripts/deploy-app-ssm.sh "$INSTANCE_ID"

      - name: Renew SSL certificate
        env:
          INSTANCE_ID: ${{ steps.infra.outputs.instance_id }}
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["certbot renew --quiet 2>/dev/null || true"]}' \
            --region "$AWS_REGION" \
            --output text
